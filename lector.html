<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de mi Préstamo</title>
    <style>
        :root { --primary: #3b82f6; --success: #22c55e; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        .card { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin-bottom: 5px; }
        .monto { font-size: 24px; font-weight: bold; margin: 15px 0; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .checked { background: var(--success); border-color: var(--success); color: white; }
        .pending { background: #f1f5f9; color: #94a3b8; }
        .x-mark { background: #ef4444; border-color: #ef4444; color: white; }
        .info { font-size: 14px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="cliente">Cliente</h2>
        <div class="info" id="fecha">Inicio: --</div>
        <div class="monto" id="total">Total: $0.00</div>
        <div class="info">Cuota diaria/semanal: <span id="cuota">$0.00</span></div>
        <hr>
        <div class="info">Mis Pagos:</div>
        <div class="grid" id="contenedorPagos"></div>
        <p class="info" style="margin-top:20px;">Este enlace es informativo. <br> Actualizado por <strong>Prestamos CC</strong>.</p>
    </div>

    <script>
        // Leer datos de la URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('cliente').innerText = params.get('n') || 'Cliente';
        document.getElementById('total').innerText = 'Total: $' + (params.get('t') || '0');
        document.getElementById('cuota').innerText = '$' + (params.get('c') || '0');
        document.getElementById('fecha').innerText = 'Inicio: ' + (params.get('f') || '--');

        const pagosStr = params.get('p') || ''; // Ejemplo: "1102" (1:pagado, 0:pendiente, 2:X)
        const contenedor = document.getElementById('contenedorPagos');

        pagosStr.split('').forEach((estado, i) => {
            const div = document.createElement('div');
            div.className = 'circle ' + (estado === '1' ? 'checked' : (estado === '2' ? 'x-mark' : 'pending'));
            div.innerText = i + 1;
            contenedor.appendChild(div);
        });
    </script>
</body>
</html>
