<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de mi Préstamo</title>
    <style>
        :root { --primary: #1e40af; --success: #15803d; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .loading { font-size: 18px; color: var(--primary); font-weight: bold; margin-top: 50px; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .checked { background: var(--success); border-color: var(--success); color: white; box-shadow: 0 0 5px var(--success); }
        .x-mark { background: #ef4444; border-color: #ef4444; color: white; }
        .info-box { background: #f8fafc; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="loader" class="loading">Cargando estado de cuenta...</div>
    
    <div id="content" class="card" style="display:none;">
        <h2 id="cliente" style="color: var(--primary); margin-bottom:5px;"></h2>
        <div id="fecha" style="font-size: 12px; color: #64748b;"></div>
        
        <div class="info-box">
            <div style="font-size: 24px; font-weight: bold;" id="total"></div>
            <div style="font-size: 14px; color: #64748b;">Cuota: <span id="cuota"></span></div>
        </div>

        <div style="font-size: 14px; font-weight: bold; margin-top: 20px;">MIS PAGOS REGISTRADOS:</div>
        <div class="grid" id="contenedorPagos"></div>
        
        <p style="font-size: 11px; color: #94a3b8; margin-top: 30px;">
            Esta información se actualiza automáticamente.<br>
            <strong>Prestamos CC</strong>
        </p>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygxcelqlUOJBIWQlBsdIQ29Dg-O857xEgGYhHk_NYzcikTefoSEp4VRGlhtVO245RodQ/exec";
        const params = new URLSearchParams(window.location.search);
        const clienteID = params.get('id');

        async function cargarDatos() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                const prestamo = data.prestamos.find(p => p.id == clienteID);

                if (prestamo) {
                    document.getElementById('cliente').innerText = prestamo.nombre;
                    document.getElementById('fecha').innerText = "Iniciado el: " + prestamo.fechaInicio;
                    document.getElementById('total').innerText = "$" + prestamo.totalCobrar.toFixed(2);
                    document.getElementById('cuota').innerText = "$" + prestamo.valorCuotaOriginal.toFixed(2);
                    
                    const contenedor = document.getElementById('contenedorPagos');
                    prestamo.pagos.forEach((pago, i) => {
                        const div = document.createElement('div');
                        div.className = 'circle ' + (pago.estado === 1 ? 'checked' : (pago.estado === 2 ? 'x-mark' : ''));
                        div.innerText = i + 1;
                        contenedor.appendChild(div);
                    });

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('loader').innerText = "Préstamo no encontrado o finalizado.";
                }
            } catch (e) {
                document.getElementById('loader').innerText = "Error al conectar con el servidor.";
            }
        }
        cargarDatos();
    </script>
</body>
</html>
