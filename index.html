<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestamos CC - Administrador Pro</title>
    <style>
        :root { 
            --primary: #1e40af; --success: #15803d; --danger: #b91c1c; --warning: #b45309; 
            --bg: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a; --border: #94a3b8; --header-bg: #0f172a;
        }

        body.dark-mode { 
            --bg: #020617; --card-bg: #0f172a; --text-main: #f8fafc; --input-bg: #1e293b; --border: #334155; --header-bg: #020617;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 20px; color: var(--text-main); transition: 0.3s; }
        .container { max-width: 1300px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 20px; }
        
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 1000; }

        .capital-section { background: var(--header-bg); color: white; padding: 15px; border-radius: 8px; text-align: center; border: 2px solid var(--primary); }
        .capital-section input { background: transparent; color: #4ade80; border: none; font-size: 1.2em; font-weight: bold; width: 120px; text-align: center; outline: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); border-left: 8px solid var(--primary); }
        .stat-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; color: var(--primary); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 20px; border-radius: 8px; }
        body.dark-mode .form-grid { background: #1e293b; }
        
        input, select { padding: 12px; border: 2px solid var(--border); border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-cloud { background-color: var(--success); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #cbd5e1; padding: 12px; border: 1px solid var(--border); color: #0f172a; }
        body.dark-mode th { background: #334155; color: white; }
        td { padding: 12px; border: 1px solid var(--border); vertical-align: middle; }
        
        .payment-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .circle-container { position: relative; text-align: center; min-width: 45px; }
        .circle { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; background: white; color: #1e293b; }
        
        .circle.checked { background: var(--success); border-color: #064e3b; color: white; }
        .circle.x-mark { background: var(--danger); border-color: #7f1d1d; color: white; }
        .circle.extra-fee { border-color: var(--warning); color: var(--warning); border-width: 3px; background: #fffbeb; }
        .circle.extra-fee.checked { background: var(--warning) !important; border-color: var(--warning) !important; color: white !important; }

        /* BOTÓN PARA BORRAR MULTA INDIVIDUAL */
        .del-multa { 
            position: absolute; top: -8px; right: -2px; background: var(--danger); color: white; 
            width: 18px; height: 18px; border-radius: 50%; font-size: 12px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; border: 1px solid white; font-weight: bold;
        }

        .date-label { font-size: 10px; display: block; margin-top: 4px; font-weight: 800; }
        .start-date-label { font-size: 11px; color: var(--danger); font-weight: 800; background: #fee2e2; padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="container">
    <div class="header-box">
        <h2 style="color: var(--primary)">💲 Prestamos CC</h2>
        <div class="capital-section">
            CAPITAL DISPONIBLE<br>
            $ <input type="number" id="capitalGlobal" step="0.01" value="0.00" readonly>
            <span style="display:block; cursor:pointer; text-decoration:underline; font-size:11px; color:#60a5fa;" onclick="ajustarCapitalConClave()">Ajustar Capital</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h4>Ganancia Total</h4><p id="gananciaTotal">$ 0.00</p></div>
        <div class="stat-card"><h4>Ganancia Mes</h4><p id="gananciaMes">$ 0.00</p></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <button onclick="guardarEnNube()" class="btn-cloud">☁️ Guardar Cambios</button>
        <button onclick="cargarDeNube()" style="background:#6d28d9">🔄 Actualizar Datos</button>
    </div>

    <div class="form-grid" id="mainForm">
        <input type="text" id="nombre" placeholder="Nombre Cliente">
        <input type="text" id="celular" placeholder="Celular">
        <input type="number" id="monto" placeholder="Monto $">
        <input type="number" id="porcentaje" placeholder="Interés %">
        <select id="modalidad" onchange="cambiarModalidad()">
            <option value="semanal">Semanal</option>
            <option value="quincenal">Quincenal</option>
        </select>
        <input type="number" id="semanas" placeholder="Semanas">
        <input type="date" id="fechaInicio">
        <button onclick="procesarPrestamo()">Registrar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>CLIENTE</th>
                <th>DEUDA</th>
                <th>PAGOS (X para borrar multa)</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygxcelqlUOJBIWQlBsdIQ29Dg-O857xEgGYhHk_NYzcikTefoSEp4VRGlhtVO245RodQ/exec"; 
    const CONTRASENA_ADMIN = "Suki24"; 

    let capitalTotal = 0;
    let prestamos = [];
    let editandoID = null;

    function cambiarModalidad() {
        const mod = document.getElementById('modalidad').value;
        document.getElementById('semanas').style.display = (mod === 'quincenal') ? 'none' : 'block';
    }

    async function guardarEnNube() {
        if (!confirm("¿Confirmar guardado?")) return;
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ capital: capitalTotal, prestamos: prestamos }) });
            alert("✅ Guardado correctamente.");
        } catch (e) { alert("❌ Error."); }
    }

    async function cargarDeNube(silencioso = false) {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            if (data) {
                prestamos = data.prestamos || [];
                capitalTotal = parseFloat(data.capital) || 0;
                actualizarUI();
                if(!silencioso) alert("✅ Sincronizado.");
            }
        } catch (e) { if(!silencioso) alert("❌ Error."); }
    }

    function procesarPrestamo() {
        if (editandoID) finalizarEdicion();
        else agregarPrestamo();
    }

    function agregarPrestamo() {
        const nom = document.getElementById('nombre').value;
        const mon = parseFloat(document.getElementById('monto').value);
        const por = parseFloat(document.getElementById('porcentaje').value) || 0;
        const mod = document.getElementById('modalidad').value;
        const sem = parseInt(document.getElementById('semanas').value) || 2;
        const fec = document.getElementById('fechaInicio').value;
        if (!nom || isNaN(mon) || !fec) return;
        const total = mon + (mon * (por / 100));
        const nCuotas = (mod === 'quincenal') ? 2 : sem;
        const cuota = total / nCuotas;
        prestamos.push({
            id: Date.now(), nombre: nom, celular: document.getElementById('celular').value,
            totalCobrar: total, valorCuotaOriginal: cuota, montoOriginal: mon,
            numSemanasOriginales: sem, fechaInicio: fec, modalidad: mod,
            pagos: Array.from({length: nCuotas}, () => ({ tipo: 'normal', estado: 0, valor: cuota }))
        });
        capitalTotal -= mon;
        actualizarUI();
    }

    // --- FUNCIÓN PARA BORRAR MULTA INDIVIDUAL ---
    function borrarMulta(pId, index) {
        if (confirm("¿Borrar esta multa de $5.00?")) {
            const p = prestamos.find(x => x.id === pId);
            const pago = p.pagos[index];
            if (pago.estado === 1) capitalTotal -= 5; // Devolvemos al capital si estaba pagada
            p.totalCobrar -= 5;
            p.pagos.splice(index, 1);
            actualizarUI();
        }
    }

    function togglePago(pId, index) {
        const p = prestamos.find(x => x.id === pId);
        const pago = p.pagos[index];
        const ant = pago.estado;
        pago.estado = (pago.estado + 1) % 3;
        if (pago.estado === 1) capitalTotal += pago.valor;
        else if (ant === 1) capitalTotal -= pago.valor;
        actualizarUI();
    }

    function agregarMulta(pId) {
        if (confirm("¿Agregar multa de $5.00?")) {
            const p = prestamos.find(x => x.id === pId);
            p.totalCobrar += 5;
            p.pagos.push({ tipo: 'extra', estado: 0, valor: 5 });
            actualizarUI();
        }
    }

    function actualizarUI() {
        document.getElementById('capitalGlobal').value = capitalTotal.toFixed(2);
        renderizarTabla();
        calcularGanancias();
    }

    function renderizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = "";
        prestamos.forEach(p => {
            const tr = document.createElement('tr');
            let circs = '<div class="payment-scroll">';
            p.pagos.forEach((pago, i) => {
                const esMulta = pago.tipo === 'extra';
                circs += `
                    <div class="circle-container">
                        ${esMulta ? `<div class="del-multa" onclick="borrarMulta(${p.id}, ${i})">×</div>` : ''}
                        <div class="circle ${pago.estado === 1 ? 'checked' : (pago.estado === 2 ? 'x-mark' : '')} ${esMulta ? 'extra-fee' : ''}" 
                             onclick="togglePago(${p.id}, ${i})">
                             ${i + 1}
                        </div>
                    </div>`;
            });
            circs += `<div class="circle" style="border:2px dashed var(--primary); color:var(--primary);" onclick="agregarMulta(${p.id})">+</div></div>`;

            let linkL = `https://tareasug2023-creator.github.io/Cobros-/lector.html?id=${p.id}`;

            tr.innerHTML = `
                <td><strong>${p.nombre}</strong><br><span class="start-date-label">INICIO: ${p.fechaInicio}</span></td>
                <td>$${p.totalCobrar.toFixed(2)}</td>
                <td>${circs}</td>
                <td>
                    <button onclick="eliminarPrestamo(${p.id})" style="background:none; color:var(--danger); text-decoration:underline;">BORRAR</button><br>
                    <button onclick="navigator.clipboard.writeText('${linkL}').then(()=>alert('Link copiado'))" style="background:none; color:var(--success); text-decoration:underline;">🔗 LINK</button>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    function eliminarPrestamo(id) {
        if (prompt("Clave para eliminar:") === CONTRASENA_ADMIN) {
            const p = prestamos.find(x => x.id === id);
            capitalTotal += p.montoOriginal;
            prestamos = prestamos.filter(x => x.id !== id);
            actualizarUI();
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeBtn').innerText = isDark ? "☀️" : "🌙";
    }

    function calcularGanancias() {
        let total = 0;
        prestamos.forEach(p => {
            p.pagos.forEach(pago => {
                if (pago.estado === 1) {
                    const cuotaBase = p.montoOriginal / (p.modalidad === 'quincenal' ? 2 : p.numSemanasOriginales);
                    total += (pago.valor - (pago.tipo === 'extra' ? 0 : cuotaBase));
                }
            });
        });
        document.getElementById('gananciaTotal').innerText = `$ ${total.toFixed(2)}`;
    }

    window.onload = () => cargarDeNube(true);
</script>
</body>
</html>
