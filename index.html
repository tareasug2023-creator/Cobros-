<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestamos CC - Capital Protegido</title>
    <style>
        :root { 
            --primary: #3b82f6; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --input-bg: #ffffff;
            --border: #e2e8f0;
            --header-bg: #1e293b;
        }

        body.dark-mode { 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #0f172a;
            --border: #334155;
            --header-bg: #0f172a;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 20px; 
            color: var(--text-main); 
            transition: background 0.3s, color 0.3s;
        }

        .container { 
            max-width: 1300px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .header-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            margin-bottom: 20px; 
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
        }

        .capital-section { 
            background: var(--header-bg); 
            color: white; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid var(--primary);
        }

        /* Estilo del input de capital bloqueado */
        .capital-section input { 
            background: transparent; 
            color: var(--success); 
            border: none; 
            font-size: 1.2em; 
            font-weight: bold; 
            width: 120px; 
            text-align: center; 
            outline: none; 
            cursor: default;
        }

        .btn-ajuste-cap {
            display: block;
            margin-top: 5px;
            font-size: 10px;
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            border-left: 5px solid var(--primary);
        }
        .stat-card.total-gain { border-left-color: var(--success); }

        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 10px; 
            margin-bottom: 20px; 
            background: var(--bg); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
        }

        input { 
            padding: 10px; 
            background: var(--input-bg);
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 14px; 
            color: var(--text-main);
            width: 90%; 
        }

        button { padding: 10px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cloud { background-color: #059669; }
        .btn-update-nube { background-color: #7c3aed; }
        
        .month-divider { 
            background: var(--border); 
            color: var(--text-dim); 
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase; 
            text-align: center; 
            padding: 8px !important; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); }
        td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .payment-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; max-width: 600px; }
        .circle { 
            width: 32px; height: 32px; 
            border-radius: 50%; 
            border: 2px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; margin: auto; 
            background: var(--bg); 
            color: var(--text-dim);
        }
        .circle.checked { background: var(--success); border-color: var(--success); color: white; }
        .circle.x-mark { background: var(--danger); border-color: var(--danger); color: white; }
        .circle.add-week { border: 2px dashed var(--primary); color: var(--primary); }
    </style>
</head>
<body class="">

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Modo Oscuro</button>

<div class="container">
    <div class="header-box">
        <h2 style="color: var(--primary)">💲 Prestamos CC</h2>
        <div class="capital-section">
            CAPITAL DISPONIBLE<br>
            $ <input type="number" id="capitalGlobal" step="0.01" value="0.00" readonly>
            <span class="btn-ajuste-cap" onclick="ajustarCapitalConClave()">Ajustar Capital (Clave)</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card total-gain">
            <h4>Ganancia Total</h4>
            <p id="gananciaTotal">$ 0.00</p>
        </div>
        <div class="stat-card">
            <h4>Ganancia Mes Actual</h4>
            <p id="gananciaMes">$ 0.00</p>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <button onclick="guardarEnNube()" class="btn-cloud">☁️ Guardar Cambios</button>
        <button onclick="cargarDeNube()" class="btn-update-nube">🔄 Actualizar Datos</button>
    </div>

    <div class="form-grid" id="mainForm">
        <input type="text" id="nombre" placeholder="Nombre" onkeyup="autoRellenar()">
        <input type="text" id="celular" placeholder="Celular" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)">
        <input type="number" id="monto" placeholder="Monto $">
        <input type="number" id="porcentaje" placeholder="Interés %">
        <input type="number" id="semanas" placeholder="Semanas" min="1">
        <input type="date" id="fechaInicio">
        <button id="btnRegistrar" onclick="procesarPrestamo()">Registrar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Resumen Deuda</th>
                <th>Pagos</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygxcelqlUOJBIWQlBsdIQ29Dg-O857xEgGYhHk_NYzcikTefoSEp4VRGlhtVO245RodQ/exec"; 
    const CONTRASENA_ADMIN = "Suki24"; 

    let capitalTotal = 0;
    let prestamos = [];
    let editandoID = null;

    // --- FUNCIÓN DE SEGURIDAD PARA CAPITAL ---
    function ajustarCapitalConClave() {
        const pass = prompt("Contraseña para modificar el capital:");
        if (pass === CONTRASENA_ADMIN) {
            const nuevoCap = prompt("Ingrese el nuevo monto del capital disponible:", capitalTotal.toFixed(2));
            if (nuevoCap !== null && !isNaN(parseFloat(nuevoCap))) {
                capitalTotal = parseFloat(nuevoCap);
                document.getElementById('capitalGlobal').value = capitalTotal.toFixed(2);
                calcularGanancias(); // Refrescar vista
            }
        } else if (pass !== null) {
            alert("❌ Contraseña incorrecta.");
        }
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
            btn.innerText = "☀️ Modo Claro";
            localStorage.setItem('theme', 'dark');
        } else {
            btn.innerText = "🌙 Modo Oscuro";
            localStorage.setItem('theme', 'light');
        }
    }

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').innerText = "☀️ Modo Claro";
        }
        cargarDeNube(true); 
    };

    function calcularGanancias() {
        let total = 0; let mes = 0;
        const ahora = new Date();
        prestamos.forEach(p => {
            const gananciaPorCuota = p.valorCuotaOriginal - (p.montoOriginal / p.numSemanasOriginales);
            let fBase = new Date(p.fechaInicio + "T00:00:00");
            p.pagos.forEach(pago => {
                fBase.setDate(fBase.getDate() + 7);
                if (pago.estado === 1) {
                    let g = (pago.tipo === 'extra') ? 5 : gananciaPorCuota;
                    total += g;
                    if (fBase.getMonth() === ahora.getMonth() && fBase.getFullYear() === ahora.getFullYear()) mes += g;
                }
            });
        });
        document.getElementById('gananciaTotal').innerText = `$ ${total.toFixed(2)}`;
        document.getElementById('gananciaMes').innerText = `$ ${mes.toFixed(2)}`;
    }

    async function guardarEnNube() {
        if (!confirm("¿Guardar cambios en la nube?")) return;
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ capital: capitalTotal, prestamos: prestamos }) });
            alert("✅ Guardado.");
        } catch (e) { alert("❌ Error."); }
    }

    async function cargarDeNube(silencioso = false) {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            if (data) {
                prestamos = data.prestamos || [];
                capitalTotal = parseFloat(data.capital) || 0;
                actualizarUI();
                if(!silencioso) alert("✅ Sincronizado.");
            }
        } catch (e) { if(!silencioso) alert("❌ Error."); }
    }

    function procesarPrestamo() {
        if (editandoID) finalizarEdicion();
        else agregarPrestamo();
    }

    function agregarPrestamo() {
        const nom = document.getElementById('nombre').value;
        const cel = document.getElementById('celular').value;
        const mon = parseFloat(document.getElementById('monto').value);
        const por = parseFloat(document.getElementById('porcentaje').value) || 0;
        const sem = parseInt(document.getElementById('semanas').value);
        const fec = document.getElementById('fechaInicio').value;
        if (!nom || isNaN(mon) || !fec || isNaN(sem)) { alert("Llene los campos."); return; }
        const cuota = (mon + (mon * (por / 100))) / sem;
        prestamos.push({
            id: Date.now(), nombre: nom, celular: cel, totalCobrar: mon + (mon * (por / 100)),
            valorCuotaOriginal: cuota, montoOriginal: mon, porcentajeOriginal: por,
            numSemanasOriginales: sem, fechaInicio: fec,
            pagos: Array.from({length: sem}, () => ({ tipo: 'normal', estado: 0, valor: cuota }))
        });
        capitalTotal -= mon;
        actualizarUI();
    }

    function prepararEdicion(id) {
        if (prompt("Contraseña:") !== CONTRASENA_ADMIN) return;
        const p = prestamos.find(x => x.id === id);
        editandoID = id;
        document.getElementById('nombre').value = p.nombre;
        document.getElementById('celular').value = p.celular;
        document.getElementById('monto').value = p.montoOriginal;
        document.getElementById('porcentaje').value = p.porcentajeOriginal;
        document.getElementById('semanas').value = p.numSemanasOriginales;
        document.getElementById('fechaInicio').value = p.fechaInicio;
        document.getElementById('mainForm').style.borderColor = "var(--warning)";
        document.getElementById('btnRegistrar').innerText = "Actualizar";
        window.scrollTo(0, 0);
    }

    function finalizarEdicion() {
        const p = prestamos.find(x => x.id === editandoID);
        const monNuevo = parseFloat(document.getElementById('monto').value);
        capitalTotal += (p.montoOriginal - monNuevo);
        p.nombre = document.getElementById('nombre').value;
        p.celular = document.getElementById('celular').value;
        p.montoOriginal = monNuevo;
        p.porcentajeOriginal = parseFloat(document.getElementById('porcentaje').value);
        p.numSemanasOriginales = parseInt(document.getElementById('semanas').value);
        p.fechaInicio = document.getElementById('fechaInicio').value;
        const nuevoT = p.montoOriginal + (p.montoOriginal * (p.porcentajeOriginal/100));
        p.valorCuotaOriginal = nuevoT / p.numSemanasOriginales;
        if (p.pagos.length !== p.numSemanasOriginales) p.pagos = Array.from({length: p.numSemanasOriginales}, () => ({ tipo: 'normal', estado: 0, valor: p.valorCuotaOriginal }));
        editandoID = null;
        document.getElementById('mainForm').style.borderColor = "var(--border)";
        document.getElementById('btnRegistrar').innerText = "Registrar";
        actualizarUI();
    }

    function eliminar(pId) {
        if (prompt("Contraseña:") === CONTRASENA_ADMIN) {
            const p = prestamos.find(x => x.id === pId);
            capitalTotal += p.montoOriginal;
            p.pagos.forEach(pago => { if (pago.estado === 1) capitalTotal -= pago.valor; });
            prestamos = prestamos.filter(x => x.id !== pId);
            actualizarUI();
        }
    }

    function actualizarUI() {
        document.getElementById('capitalGlobal').value = capitalTotal.toFixed(2);
        prestamos.sort((a, b) => new Date(a.fechaInicio + "T00:00:00") - new Date(b.fechaInicio + "T00:00:00"));
        renderizarTabla();
        calcularGanancias();
        ["nombre", "celular", "monto", "porcentaje", "semanas", "fechaInicio"].forEach(id => document.getElementById(id).value = "");
    }

    function togglePago(pId, index) {
        const p = prestamos.find(x => x.id === pId);
        const pago = p.pagos[index];
        const ant = pago.estado;
        pago.estado = (pago.estado + 1) % 3;
        if (pago.estado === 1) capitalTotal += pago.valor;
        else if (ant === 1) capitalTotal -= pago.valor;
        actualizarUI();
    }

    function autoRellenar() {
        if (editandoID) return;
        const bus = document.getElementById('nombre').value.toLowerCase().trim();
        if (bus.length < 2) return;
        const c = prestamos.find(p => p.nombre.toLowerCase().includes(bus));
        if (c) {
            document.getElementById('celular').value = c.celular;
            document.getElementById('monto').value = c.montoOriginal;
            document.getElementById('porcentaje').value = c.porcentajeOriginal;
            document.getElementById('semanas').value = c.numSemanasOriginales;
        }
    }

    function agregarSemana(pId) {
        if (prompt("Contraseña:") === CONTRASENA_ADMIN) {
            const p = prestamos.find(x => x.id === pId);
            p.totalCobrar += 5;
            p.pagos.push({ tipo: 'extra', estado: 0, valor: 5 });
            actualizarUI();
        }
    }

    function renderizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = "";
        let ultimoMes = "";
        prestamos.forEach(p => {
            const fObj = new Date(p.fechaInicio + "T00:00:00");
            const mesStr = fObj.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            if (mesStr !== ultimoMes) {
                const trMes = document.createElement('tr');
                trMes.innerHTML = `<td colspan="4" class="month-divider">${mesStr}</td>`;
                tbody.appendChild(trMes);
                ultimoMes = mesStr;
            }
            const tr = document.createElement('tr');
            let circs = '<div class="payment-scroll">';
            let fP = new Date(p.fechaInicio + "T00:00:00");
            p.pagos.forEach((pago, i) => {
                fP.setDate(fP.getDate() + 7);
                const d = fP.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
                let cl = pago.estado === 1 ? "checked" : (pago.estado === 2 ? "x-mark" : "");
                circs += `<div class="circle-box"><div class="circle ${cl} ${pago.tipo==='extra'?'extra-fee':''}" onclick="togglePago(${p.id}, ${i})"></div><span class="date-label">${d}</span></div>`;
            });
            circs += `<div class="circle add-week" onclick="agregarSemana(${p.id})">+</div></div>`;

            tr.innerHTML = `<td><strong>${p.nombre}</strong><br><a href="https://wa.me/593${p.celular}" target="_blank" style="color:var(--primary); font-size:12px; text-decoration:none;">📱 WhatsApp</a></td>
                <td><small>Cuota: $${p.valorCuotaOriginal.toFixed(2)}</small><br><strong>Total:$${p.totalCobrar.toFixed(2)}</strong></td>
                <td>${circs}</td>
                <td><button onclick="prepararEdicion(${p.id})" style="background:none; color:var(--warning); text-decoration:underline; font-size:11px; border:none; cursor:pointer;">Editar</button>
                <button onclick="eliminar(${p.id})" style="background:none; color:var(--danger); text-decoration:underline; font-size:11px; border:none; cursor:pointer;">Borrar</button></td>`;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
