<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestamos CC - Auditoría Real</title>
    <style>
        :root { 
            --primary: #1e40af; --success: #15803d; --danger: #b91c1c; --warning: #b45309; 
            --bg: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a; --text-dim: #334155;
            --input-bg: #ffffff; --border: #94a3b8; --header-bg: #0f172a;
        }

        body.dark-mode { 
            --bg: #020617; --card-bg: #0f172a; --text-main: #f8fafc; --text-dim: #cbd5e1;
            --input-bg: #1e293b; --border: #334155; --header-bg: #020617;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 20px; color: var(--text-main); transition: 0.3s; }
        .container { max-width: 1300px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 20px; }
        
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 1000; }

        .capital-section { background: var(--header-bg); color: white; padding: 15px; border-radius: 8px; text-align: center; border: 2px solid var(--primary); }
        .capital-section input { background: transparent; color: #4ade80; border: none; font-size: 1.2em; font-weight: bold; width: 120px; text-align: center; outline: none; }
        
        .tools-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 10px; }
        .btn-tool { padding: 10px 15px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; border: none; color: white; transition: 0.2s; }
        .btn-audit { background: #6d28d9; }
        .btn-history { background: var(--success); }

        .notif-panel { background: #fffbeb; border: 2px solid #f59e0b; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        body.dark-mode .notif-panel { background: #451a03; border-color: #f59e0b; color: white; }
        .notif-title { font-weight: 800; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .notif-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-send-notif { background: #25d366; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }

        .search-container { margin-bottom: 20px; }
        .search-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--input-bg); color: var(--text-main); box-sizing: border-box; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); border-left: 8px solid var(--primary); }
        .stat-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; color: var(--primary); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        body.dark-mode .form-grid { background: #1e293b; }
        
        input, select { padding: 12px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 6px; color: var(--text-main); width: 100%; box-sizing: border-box; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-cloud { background-color: var(--success); }

        .month-divider { background: var(--header-bg); color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; padding: 12px !important; cursor: pointer; border: 1px solid var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #cbd5e1; text-align: left; padding: 12px; border: 1px solid var(--border); color: #0f172a; font-weight: 800; }
        body.dark-mode th { background: #334155; color: white; }
        td { padding: 12px; border: 1px solid var(--border); vertical-align: middle; background: var(--card-bg); }
        
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 8px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success); transition: 0.5s; }

        .payment-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .circle { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; margin: auto; background: #f8fafc; color: #1e293b; font-weight: bold; }
        .circle.checked { background: var(--success) !important; color: white !important; }
        .circle.x-mark { background: var(--danger) !important; color: white !important; }
        .circle.extra-fee { border-color: var(--warning); border-width: 3px; }
        .circle.extra-fee.checked { background: var(--warning) !important; color: white !important; }
        .circle.add-week { border: 2px dashed var(--primary); color: var(--primary); font-size: 18px; background: transparent; }
        
        .date-label { font-size: 10px; color: var(--text-main); display: block; margin-top: 4px; font-weight: 800; }
        .start-date-label { font-size: 11px; color: var(--danger); font-weight: 800; background: #fee2e2; padding: 2px 4px; border-radius: 4px; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; color: white; }
        .badge-semanal { background: #6366f1; }
        .badge-quincenal { background: #ec4899; }
        .btn-action { background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; border-radius: 4px; }
        .btn-action:hover { background: rgba(0,0,0,0.1); }
        .cuota-highlight { color: var(--primary); font-weight: 800; font-size: 1.1em; }
        body.dark-mode .cuota-highlight { color: #60a5fa; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="container">
    <div class="header-box">
        <h2 style="color: var(--primary)">💲 Prestamos CC</h2>
        <div class="capital-section">
            SALDO REAL EN CAJA<br>
            $ <input type="number" id="capitalGlobal" step="0.01" value="0.00" readonly>
            <span style="display:block; cursor:pointer; text-decoration:underline; font-size:11px; color:#60a5fa;" onclick="ajustarCapitalConClave()">Ajustar Manualmente</span>
        </div>
    </div>

    <div class="tools-box">
        <span style="font-weight: 800; font-size: 13px;">⚙️ CONTABILIDAD:</span>
        <button class="btn-tool btn-audit" onclick="auditoriaBase()">📊 Auditoría (Cuadre de Efectivo)</button>
        <button class="btn-tool btn-history" onclick="mostrarHistorialExcel()">💰 Intereses Mensuales (Excel)</button>
        <button class="btn-tool" style="background:#0f172a;" onclick="window.print()">🖨️ Reporte Imprimible</button>
    </div>

    <div id="notifPanel" class="notif-panel">
        <div class="notif-title">🔔 COBROS PARA HOY:</div>
        <div id="notifList" class="notif-list"></div>
    </div>

    <div class="search-container">
        <input type="text" id="busqueda" class="search-input" placeholder="🔍 Buscar cliente..." onkeyup="renderizarTabla()">
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h4>Interés Cobrado Total</h4><p id="gananciaTotal">$ 0.00</p></div>
        <div class="stat-card"><h4>Interés Cobrado Mes</h4><p id="gananciaMes">$ 0.00</p></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <button onclick="guardarEnNube()" class="btn-cloud">☁️ Guardar Cambios</button>
        <button onclick="cargarDeNube()" style="background:#6d28d9">🔄 Actualizar Datos</button>
    </div>

    <div class="form-grid" id="mainForm">
        <input type="text" id="nombre" placeholder="Nombre Cliente" onkeyup="autoRellenar()">
        <input type="text" id="celular" placeholder="WhatsApp (Ej: 0987654321)">
        <input type="number" id="monto" placeholder="Monto $">
        <input type="number" id="porcentaje" placeholder="Interés %">
        <select id="modalidad" onchange="cambiarModalidad()">
            <option value="semanal">Cobro Semanal</option>
            <option value="quincenal">Cobro Quincenal</option>
        </select>
        <input type="number" id="semanas" placeholder="Semanas" min="1">
        <input type="date" id="fechaInicio">
        <button id="btnRegistrar" onclick="procesarPrestamo()">Registrar Préstamo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>CLIENTE / INFO</th>
                <th width="160">ESTADO / CUOTA</th>
                <th>PAGOS</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygxcelqlUOJBIWQlBsdIQ29Dg-O857xEgGYhHk_NYzcikTefoSEp4VRGlhtVO245RodQ/exec"; 
    const CONTRASENA_ADMIN = "Suki24"; 

    let capitalTotal = 0;
    let prestamos = [];
    let editandoID = null;
    let mesesColapsados = {};

    // --- AUDITORÍA BASADA EN DINERO REAL COBRADO ---
    function auditoriaBase() {
        if (prompt("Clave:") !== CONTRASENA_ADMIN) return;
        const capitalInicialBase = 1000.00;
        let capitalEnCalle = 0;
        let interesesYMultasCobrados = 0;

        prestamos.forEach(p => {
            const cuotasTotales = p.modalidad === 'quincenal' ? 2 : p.numSemanasOriginales;
            const capPorCuota = p.montoOriginal / cuotasTotales;
            
            const pagadas = p.pagos.filter(pag => pag.estado === 1 && pag.tipo !== 'extra').length;
            const capitalYaDevuelto = pagadas * capPorCuota;
            
            // Capital que el cliente aún me debe
            capitalEnCalle += (p.montoOriginal - capitalYaDevuelto);
            
            // Intereses reales cobrados (Círculos verdes)
            p.pagos.forEach(pag => {
                if(pag.estado === 1) {
                    interesesYMultasCobrados += (pag.tipo === 'extra' ? 5 : (pag.valor - capPorCuota));
                }
            });
        });

        // CAJA = Inicial - Lo que falta cobrar + Intereses ganados
        capitalTotal = capitalInicialBase - capitalEnCalle + interesesYMultasCobrados;
        
        actualizarUI();
        alert(`RESULTADO DE AUDITORÍA:\n\n` +
              `Dinero prestado (en la calle): $${capitalEnCalle.toFixed(2)}\n` +
              `Ganancias cobradas (bolsillo): $${interesesYMultasCobrados.toFixed(2)}\n\n` +
              `SALDO FINAL QUE DEBES TENER: $${capitalTotal.toFixed(2)}`);
    }

    // REPORTE ESTILO EXCEL (PROYECTADO)
    function mostrarHistorialExcel() {
        let reporte = {};
        prestamos.forEach(p => {
            const fO = new Date(p.fechaInicio + "T00:00:00");
            const mId = fO.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            const gan = p.montoOriginal * (p.porcentajeOriginal / 100);
            const mul = p.pagos.filter(pag => pag.tipo === 'extra' && pag.estado === 1).length * 5;
            if (!reporte[mId]) reporte[mId] = { prestado: 0, ganancia: 0 };
            reporte[mId].prestado += p.montoOriginal;
            reporte[mId].ganancia += (gan + mul);
        });
        let msg = "📊 REPORTE DE ORIGINACIÓN:\n\n";
        Object.keys(reporte).reverse().forEach(m => {
            msg += `• ${m.toUpperCase()}:\n  - Prestado: $${reporte[m].prestado.toFixed(2)}\n  - Utilidad Proyectada: $${reporte[m].ganancia.toFixed(2)}\n\n`;
        });
        alert(msg || "Sin datos.");
    }

    function cambiarModalidad() {
        const mod = document.getElementById('modalidad').value;
        document.getElementById('semanas').style.display = (mod === 'quincenal') ? 'none' : 'block';
    }

    function autoRellenar() {
        if (editandoID) return;
        const bus = document.getElementById('nombre').value.toLowerCase().trim();
        if (bus.length < 2) return;
        const c = prestamos.find(p => p.nombre.toLowerCase().includes(bus));
        if (c) {
            document.getElementById('celular').value = c.celular || "";
            document.getElementById('monto').value = c.montoOriginal || "";
            document.getElementById('porcentaje').value = c.porcentajeOriginal || 0;
        }
    }

    function toggleMes(mesId) {
        mesesColapsados[mesId] = !mesesColapsados[mesId];
        renderizarTabla();
    }

    function ajustarCapitalConClave() {
        if (prompt("Clave:") === CONTRASENA_ADMIN) {
            const n = prompt("Manual:", capitalTotal.toFixed(2));
            if (n) { capitalTotal = parseFloat(n); actualizarUI(); }
        }
    }

    async function guardarEnNube() {
        if (!confirm("¿Guardar?")) return;
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ capital: capitalTotal, prestamos: prestamos }) });
            alert("✅ Guardado.");
        } catch (e) { alert("❌ Error."); }
    }

    async function cargarDeNube(silencioso = false) {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            if (data) {
                prestamos = data.prestamos || [];
                capitalTotal = parseFloat(data.capital) || 0;
                actualizarUI();
                if(!silencioso) alert("✅ Sincronizado.");
            }
        } catch (e) { if(!silencioso) alert("❌ Error."); }
    }

    function procesarPrestamo() {
        if (editandoID) finalizarEdicion();
        else agregarPrestamo();
    }

    function agregarPrestamo() {
        const nom = document.getElementById('nombre').value;
        const mon = parseFloat(document.getElementById('monto').value);
        const por = parseFloat(document.getElementById('porcentaje').value) || 0;
        const mod = document.getElementById('modalidad').value;
        const sem = parseInt(document.getElementById('semanas').value) || 2;
        const fec = document.getElementById('fechaInicio').value;
        let cel = document.getElementById('celular').value.replace(/\D/g, '');
        if (!nom || isNaN(mon) || !fec) return;
        const total = mon + (mon * (por / 100));
        const nC = (mod === 'quincenal') ? 2 : sem;
        prestamos.push({
            id: Date.now(), nombre: nom, celular: cel, totalCobrar: total, valorCuotaOriginal: total/nC,
            montoOriginal: mon, numSemanasOriginales: sem, fechaInicio: fec, modalidad: mod, porcentajeOriginal: por,
            pagos: Array.from({length: nC}, () => ({ tipo: 'normal', estado: 0, valor: total/nC }))
        });
        capitalTotal -= mon;
        actualizarUI();
    }

    function enviarRecordatorio(id, monto = null) {
        const p = prestamos.find(x => x.id === id);
        const lectorLink = `https://tareasug2023-creator.github.io/Cobros-/lector.html?id=${p.id}`;
        let celFinal = p.celular; if (celFinal.startsWith('0')) celFinal = celFinal.substring(1);
        let msg = monto ? `Hola ${p.nombre}, vence tu cuota de $${monto.toFixed(2)}. Revisa aqui: ${lectorLink}` : `Hola ${p.nombre}, estado actualizado: ${lectorLink}`;
        window.open(`https://api.whatsapp.com/send?phone=593${celFinal}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    function prepararEdicion(id) {
        if (prompt("Clave:") !== CONTRASENA_ADMIN) return;
        const p = prestamos.find(x => x.id === id);
        editandoID = id;
        document.getElementById('nombre').value = p.nombre;
        document.getElementById('celular').value = p.celular;
        document.getElementById('monto').value = p.montoOriginal;
        document.getElementById('porcentaje').value = p.porcentajeOriginal;
        document.getElementById('modalidad').value = p.modalidad;
        document.getElementById('semanas').value = p.numSemanasOriginales;
        document.getElementById('fechaInicio').value = p.fechaInicio;
        document.getElementById('btnRegistrar').innerText = "Guardar Cambios";
        cambiarModalidad(); window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function finalizarEdicion() {
        const p = prestamos.find(x => x.id === editandoID);
        const monN = parseFloat(document.getElementById('monto').value);
        capitalTotal += (p.montoOriginal - monN);
        p.nombre = document.getElementById('nombre').value;
        p.celular = document.getElementById('celular').value.replace(/\D/g, '');
        p.montoOriginal = monN;
        p.porcentajeOriginal = parseFloat(document.getElementById('porcentaje').value) || 0;
        p.modalidad = document.getElementById('modalidad').value;
        p.numSemanasOriginales = parseInt(document.getElementById('semanas').value) || 2;
        p.fechaInicio = document.getElementById('fechaInicio').value;
        const nT = p.montoOriginal + (p.montoOriginal * (p.porcentajeOriginal / 100));
        const nC = (p.modalidad === 'quincenal') ? 2 : p.numSemanasOriginales;
        p.totalCobrar = nT; p.valorCuotaOriginal = nT / nC;
        p.pagos = Array.from({length: nC}, () => ({ tipo: 'normal', estado: 0, valor: nT / nC }));
        editandoID = null; document.getElementById('btnRegistrar').innerText = "Registrar";
        actualizarUI();
    }

    function menuEliminar(id) {
        const opc = prompt("1. Borrar Última Multa\n2. Borrar Préstamo Completo");
        if (opc === "1") {
            if (prompt("Clave:") === CONTRASENA_ADMIN) {
                const p = prestamos.find(x => x.id === id);
                const idx = [...p.pagos].reverse().findIndex(pag => pag.tipo === 'extra');
                if (idx !== -1) {
                    const rIdx = p.pagos.length - 1 - idx;
                    if (p.pagos[rIdx].estado === 1) capitalTotal -= 5;
                    p.totalCobrar -= 5; p.pagos.splice(rIdx, 1);
                    actualizarUI();
                }
            }
        } else if (opc === "2") {
            if (prompt("Clave:") === CONTRASENA_ADMIN) {
                const p = prestamos.find(x => x.id === id);
                capitalTotal += p.montoOriginal;
                prestamos = prestamos.filter(x => x.id !== id);
                actualizarUI();
            }
        }
    }

    function togglePago(pId, index) {
        const p = prestamos.find(x => x.id === pId);
        const pago = p.pagos[index];
        const ant = pago.estado;
        pago.estado = (pago.estado + 1) % 3;
        if (pago.estado === 1) capitalTotal += pago.valor;
        else if (ant === 1) capitalTotal -= pago.valor;
        actualizarUI();
    }

    function agregarMulta(pId) {
        if (prompt("Clave multa ($5):") === CONTRASENA_ADMIN) {
            const p = prestamos.find(x => x.id === pId);
            p.totalCobrar += 5;
            p.pagos.push({ tipo: 'extra', estado: 0, valor: 5 });
            actualizarUI();
        }
    }

    function actualizarUI() {
        document.getElementById('capitalGlobal').value = capitalTotal.toFixed(2);
        prestamos.sort((a, b) => new Date(a.fechaInicio + "T00:00:00") - new Date(b.fechaInicio + "T00:00:00"));
        renderizarTabla(); calcularGanancias(); generarNotificaciones();
        if(!editandoID) ["nombre", "celular", "monto", "porcentaje", "semanas", "fechaInicio"].forEach(id => {
            const el = document.getElementById(id); if(el) el.value = "";
        });
    }

    function generarNotificaciones() {
        const list = document.getElementById('notifList');
        const hoy = new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
        list.innerHTML = ""; let hoyCount = 0;
        prestamos.forEach(p => {
            p.pagos.forEach((pago, i) => {
                if (pago.estado === 0) {
                    let fP = new Date(p.fechaInicio + "T00:00:00");
                    if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30));
                    else fP.setDate(fP.getDate() + ((i + 1) * 7));
                    if (fP.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}) === hoy) {
                        hoyCount++;
                        list.innerHTML += `<div class="notif-item"><span>👤 <b>${p.nombre}</b> ($${pago.valor.toFixed(2)})</span><button class="btn-send-notif" onclick="enviarRecordatorio(${p.id}, ${pago.valor})">📲 COBRAR</button></div>`;
                    }
                }
            });
        });
        document.getElementById('notifPanel').style.display = hoyCount > 0 ? "block" : "none";
    }

    function renderizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        const query = document.getElementById('busqueda').value.toLowerCase();
        tbody.innerHTML = ""; let ultimoMes = "";
        prestamos.forEach(p => {
            if (query && !p.nombre.toLowerCase().includes(query)) return;
            const fObj = new Date(p.fechaInicio + "T00:00:00");
            const mesId = fObj.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            if (mesId !== ultimoMes) {
                const trM = document.createElement('tr');
                const icono = mesesColapsados[mesId] ? "🔽" : "🔼";
                trM.innerHTML = `<td colspan="4" class="month-divider" onclick="toggleMes('${mesId}')">${mesId.toUpperCase()} <span style="float:right;">${icono}</span></td>`;
                tbody.appendChild(trM); ultimoMes = mesId;
            }
            if (mesesColapsados[mesId]) return;
            const pHechos = p.pagos.filter(pag => pag.estado === 1).length;
            const porcentaje = (pHechos / p.pagos.length) * 100;
            const tr = document.createElement('tr');
            let circs = '<div class="payment-scroll">';
            p.pagos.forEach((pago, i) => {
                let fP = new Date(p.fechaInicio + "T00:00:00");
                if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30));
                else fP.setDate(fP.getDate() + ((i + 1) * 7));
                circs += `<div style="text-align:center; min-width:45px;"><div class="circle ${pago.estado===1?'checked':(pago.estado===2?'x-mark':'')} ${pago.tipo==='extra'?'extra-fee':''}" onclick="togglePago(${p.id}, ${i})">${i + 1}</div><span class="date-label">${fP.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})}</span></div>`;
            });
            circs += `<div class="circle add-week" onclick="agregarMulta(${p.id})">+</div></div>`;

            let linkL = `https://tareasug2023-creator.github.io/Cobros-/lector.html?id=${p.id}`;
            tr.innerHTML = `<td><strong>${p.nombre}</strong> <span class="badge ${p.modalidad==='quincenal'?'badge-quincenal':'badge-semanal'}">${p.modalidad}</span><br><span class="start-date-label">📅 ${p.fechaInicio}</span></td>
            <td><div class="progress-container"><div class="progress-bar" style="width:${porcentaje}%"></div></div><div>Cuota: <span class="cuota-highlight">$${p.valorCuotaOriginal.toFixed(2)}</span></div><div style="font-size:11px; margin-top:2px;">Deuda: $${p.totalCobrar.toFixed(2)}</div></td>
            <td>${circs}</td>
            <td><div style="display:flex; gap:5px;"><button class="btn-action" onclick="prepararEdicion(${p.id})" title="Editar">✏️</button><button class="btn-action" onclick="enviarRecordatorio(${p.id})" title="WhatsApp">📞</button><button class="btn-action" onclick="navigator.clipboard.writeText('${linkL}').then(()=>alert('Copiado'))" title="Copiado">🔗</button><button class="btn-action" onclick="menuEliminar(${p.id})" title="Borrar">🗑️</button></div></td>`;
            tbody.appendChild(tr);
        });
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('themeBtn').innerText = document.body.classList.contains('dark-mode') ? "☀️" : "🌙";
    }

    function calcularGanancias() {
        let totalReal = 0; let mesValReal = 0; const ahora = new Date();
        prestamos.forEach(p => {
            const nCuotas = p.modalidad === 'quincenal' ? 2 : p.numSemanasOriginales;
            const capPorCuota = p.montoOriginal / nCuotas;

            p.pagos.forEach((pag, i) => {
                if (pag.estado === 1) {
                    let g = (pag.tipo === 'extra' ? 5 : (pag.valor - capPorCuota));
                    totalReal += g;
                    
                    let fP = new Date(p.fechaInicio + "T00:00:00");
                    if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30));
                    else fP.setDate(fP.getDate() + ((i + 1) * 7));
                    
                    if (fP.getMonth() === ahora.getMonth() && fP.getFullYear() === ahora.getFullYear()) mesValReal += g;
                }
            });
        });
        document.getElementById('gananciaTotal').innerText = `$ ${totalReal.toFixed(2)}`;
        document.getElementById('gananciaMes').innerText = `$ ${mesValReal.toFixed(2)}`;
    }

    window.onload = () => cargarDeNube(true);
</script>
</body>
</html>
